name: Integration Tests Real Device

on:
  pull_request:
    branches:
      - "**"
      - "!release/*" # don't run on PRs targeting release branches as it already run when merging to main
  workflow_dispatch:
  workflow_call:

env:
  PATH_TO_DEMO: demo
  FLUTTER_VERSION: 3.38.3

jobs:
  integration-test-ios:
    # Run automatically on PRs, main, and tags; allow manual via workflow_dispatch
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      github.event_name == 'workflow_dispatch'
    name: "Integration Tests iOS (Demo and Package)"
    runs-on: macOS-latest
    steps:
      - uses: actions/checkout@v4
      - uses: futureware-tech/simulator-action@v3
        with:
          model: "iPhone 16 Plus"
      - uses: subosito/flutter-action@v2
        with:
          channel: "master"
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          cache: true
          cache-key: flutter-sdk-${{ runner.os }}-${{ env.FLUTTER_VERSION }}
          pub-cache-key: flutter-pub-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'demo/pubspec.lock') }}

      - name: Cache Flutter build artifacts (iOS)
        uses: actions/cache@v4
        with:
          path: |
            build
            .dart_tool
            demo/build
            demo/.dart_tool
            ~/Library/Developer/Xcode/DerivedData
          key: flutter-build-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'demo/pubspec.lock') }}
          restore-keys: |
            flutter-build-${{ runner.os }}

      - name: Install package dependencies
        run: flutter pub get

      - name: Install demo dependencies
        run: flutter pub get
        working-directory: ${{ env.PATH_TO_DEMO }}
      - name: Install junitreport converter
        run: |
          dart pub global activate junitreport
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: Run integration tests (iOS) with coverage
        working-directory: .
        run: make test-integration-coverage

      - name: Upload Integration Test Coverage (iOS)
        uses: actions/upload-artifact@v4
        with:
          name: integration-ios-coverage
          path: demo/coverage/integration/lcov.info

      - name: Upload Integration Test Results (iOS)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-ios-results
          path: demo/build/test-results/integration/junit.xml

      - name: Publish Integration Test Results (iOS)
        uses: EnricoMi/publish-unit-test-result-action/macos@v2
        if: always()
        with:
          files: demo/build/test-results/integration/junit.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  integration-test-android:
    # Run automatically on PRs, main, and tags; allow manual via workflow_dispatch
    if: >
      github.event_name == 'pull_request' ||
      (github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))) ||
      github.event_name == 'workflow_dispatch'
    name: "Integration Tests Android (Demo and Package)"
    runs-on: ubuntu-latest
    steps:
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v2
        with:
          distribution: "zulu"
          java-version: "21"

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: "master"
          flutter-version: "${{ env.FLUTTER_VERSION }}"
          cache: true
          cache-key: flutter-sdk-${{ runner.os }}-${{ env.FLUTTER_VERSION }}
          pub-cache-key: flutter-pub-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'demo/pubspec.lock') }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      #   - name: Cache Flutter build artifacts (Android)
      #     uses: actions/cache@v4
      #     with:
      #       path: |
      #         build
      #         .dart_tool
      #         demo/build
      #         demo/.dart_tool
      #       key: flutter-build-${{ runner.os }}-${{ hashFiles('pubspec.lock', 'demo/pubspec.lock') }}
      #       restore-keys: |
      #         flutter-build-${{ runner.os }}

      - name: Install package dependencies
        run: flutter pub get

      - name: Install demo dependencies
        run: flutter pub get
        working-directory: ${{ env.PATH_TO_DEMO }}

      - name: Install junitreport converter
        run: |
          dart pub global activate junitreport
          echo "$HOME/.pub-cache/bin" >> $GITHUB_PATH

      - name: AVD cache
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-api-31

      - name: Create AVD snapshot for caching
        if: steps.avd-cache.outputs.cache-hit != 'true'
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: false
          script: echo "Generated AVD snapshot for caching."

      - name: Run integration tests (Android)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: google_apis
          arch: x86_64
          profile: pixel_7_pro
          force-avd-creation: false
          emulator-options: -no-snapshot-save -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: make test-integration-coverage

      - name: Upload Integration Test Coverage (Android)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-android-coverage
          path: demo/coverage/integration/lcov.info

      - name: Upload Integration Test Results (Android)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-android-results
          path: demo/build/test-results/integration/junit.xml

      - name: Publish Integration Test Results (Android)
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()
        with:
          files: demo/build/test-results/integration/junit.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-demo-app:
    needs: [integration-test-ios, integration-test-android]
    if: github.ref == 'refs/heads/main'
    uses: ./.github/workflows/deploy-demo-app.yaml
    secrets: inherit
